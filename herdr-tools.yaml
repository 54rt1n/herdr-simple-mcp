# herdr-simple-mcp tool contract — the single source of truth.
#
# DERIVED FROM herdr's own source: src/api/schema/*.rs at v0.7.0 (the `*Params` structs).
# A field is required unless the struct marks it `#[serde(default)]` or `Option<…>`.
# Enums are encoded with `enum:`; structured (tagged) fields are `type: object/array`
# with the shape in `desc`. herdr ignores unknown fields, so methods with optional
# fields beyond what's listed are marked `passthrough: true` (we never reject a valid call).
#
# One MCP tool per method (name = method with "." -> "_"). To regenerate, re-read the
# schema structs — do not trust the website docs (they were badly out of sync at 0.7.0).

herdr_version: "0.7.0"

methods:
  # ── server ──────────────────────────────────────────────────────────────
  ping:
    group: observe
    description: Health check — returns herdr's pong, version, and capabilities.
    passthrough: true
  server.agent_manifests:
    group: observe
    description: List known agent manifests.
    passthrough: true
  server.reload_agent_manifests:
    group: admin
    description: Reload agent manifests from disk.
    passthrough: true
  server.reload_config:
    group: admin
    description: Reload herdr configuration from disk.
    passthrough: true
  server.stop:
    group: admin
    danger: true
    description: Stop the herdr server (DESTRUCTIVE).
    passthrough: true
  server.live_handoff:
    group: admin
    danger: true
    description: Hand off the running server to a new process (disruptive).
    passthrough: true
    params:
      expected_protocol: { type: integer }
      expected_version:  { type: string }
  notification.show:
    group: admin
    description: Show a desktop notification.
    passthrough: true
    params:
      title: { type: string, required: true }
      body:  { type: string }
      sound: { type: string, enum: [none, done, request] }
  client.window_title.set:
    group: admin
    description: Set the terminal window title.
    params:
      title: { type: string, required: true }
  client.window_title.clear:
    group: admin
    description: Clear the terminal window title.
    passthrough: true

  # ── workspace ───────────────────────────────────────────────────────────
  workspace.create:
    group: structure
    description: Create a workspace.
    passthrough: true
    params:
      cwd:   { type: string }
      label: { type: string }
      focus: { type: boolean }
  workspace.list:
    group: observe
    description: List all workspaces in the session.
    passthrough: true
  workspace.get:
    group: observe
    description: Get a workspace's details.
    params:
      workspace_id: { type: string, required: true }
  workspace.focus:
    group: structure
    description: Focus a workspace.
    params:
      workspace_id: { type: string, required: true }
  workspace.rename:
    group: structure
    description: Rename a workspace.
    params:
      workspace_id: { type: string, required: true }
      label:        { type: string, required: true }
  workspace.close:
    group: structure
    danger: true
    description: Close a workspace.
    params:
      workspace_id: { type: string, required: true }

  # ── worktree ────────────────────────────────────────────────────────────
  worktree.list:
    group: observe
    description: List git worktrees for a workspace.
    passthrough: true
    params:
      workspace_id: { type: string }
      cwd:          { type: string }
  worktree.create:
    group: structure
    description: Create a git worktree (provide branch and/or path; defaults to current repo).
    passthrough: true
    params:
      workspace_id: { type: string }
      cwd:          { type: string }
      branch:       { type: string }
      base:         { type: string }
      path:         { type: string }
      label:        { type: string }
      focus:        { type: boolean }
  worktree.open:
    group: structure
    description: Open an existing git worktree by path or branch.
    passthrough: true
    params:
      workspace_id: { type: string }
      cwd:          { type: string }
      path:         { type: string }
      branch:       { type: string }
      focus:        { type: boolean }
  worktree.remove:
    group: structure
    danger: true
    description: Remove a git worktree (DESTRUCTIVE).
    params:
      workspace_id: { type: string, required: true }
      force:        { type: boolean }

  # ── tab ─────────────────────────────────────────────────────────────────
  tab.create:
    group: structure
    description: Create a tab (defaults to the focused workspace).
    passthrough: true
    params:
      workspace_id: { type: string }
      cwd:          { type: string }
      label:        { type: string }
      focus:        { type: boolean }
  tab.list:
    group: observe
    description: List tabs, optionally scoped to a workspace.
    passthrough: true
    params:
      workspace_id: { type: string }
  tab.get:
    group: observe
    description: Get a tab's details.
    params:
      tab_id: { type: string, required: true }
  tab.focus:
    group: structure
    description: Focus a tab.
    params:
      tab_id: { type: string, required: true }
  tab.rename:
    group: structure
    description: Rename a tab.
    params:
      tab_id: { type: string, required: true }
      label:  { type: string, required: true }
  tab.close:
    group: structure
    danger: true
    description: Close a tab.
    params:
      tab_id: { type: string, required: true }

  # ── agent ───────────────────────────────────────────────────────────────
  agent.list:
    group: observe
    description: List detected agents.
    passthrough: true
  agent.get:
    group: observe
    description: Get an agent's details by target.
    params:
      target: { type: string, required: true, desc: "terminal_id, pane_id, or unambiguous agent name." }
  agent.read:
    group: observe
    description: Read an agent's output by target.
    passthrough: true
    params:
      target: { type: string, required: true }
      source: { type: string, required: true, enum: [visible, recent, recent_unwrapped, detection] }
      lines:  { type: integer }
  agent.explain:
    group: observe
    description: Explain an agent's current state.
    params:
      target: { type: string, required: true }
  agent.focus:
    group: agents
    description: Focus an agent by target.
    params:
      target: { type: string, required: true }
  agent.send:
    group: agents
    description: "Send text to an agent's input field. Does not press Enter."
    params:
      target: { type: string, required: true }
      text:   { type: string, required: true }
  agent.rename:
    group: agents
    description: Rename an agent.
    params:
      target: { type: string, required: true }
      name:   { type: string }
  agent.start:
    group: agents
    description: Start an agent. `name` is the agent (e.g. claude, codex); `argv` are extra CLI args (use [] for none).
    passthrough: true
    params:
      name:         { type: string, required: true, desc: "Agent to launch, e.g. claude or codex." }
      argv:         { type: array,  required: true, desc: "Extra CLI args as a string array; [] for none." }
      cwd:          { type: string }
      workspace_id: { type: string }
      tab_id:       { type: string }
      split:        { type: string, enum: [right, down] }
      focus:        { type: boolean }

  # ── pane ────────────────────────────────────────────────────────────────
  pane.list:
    group: observe
    description: List panes, optionally scoped to a workspace.
    passthrough: true
    params:
      workspace_id: { type: string }
  pane.current:
    group: observe
    description: Get the current/focused pane.
    passthrough: true
  pane.get:
    group: observe
    description: Get a pane's details.
    params:
      pane_id: { type: string, required: true }
  pane.read:
    group: observe
    description: Read a pane's output.
    passthrough: true
    params:
      pane_id: { type: string, required: true }
      source:  { type: string, required: true, enum: [visible, recent, recent_unwrapped, detection] }
      lines:   { type: integer }
  pane.layout:
    group: observe
    description: Get a pane/tab layout.
    passthrough: true
  pane.process_info:
    group: observe
    description: Get a pane's process info.
    passthrough: true
  pane.neighbor:
    group: observe
    description: Get a pane's neighbor in a direction.
    passthrough: true
    params:
      direction: { type: string, required: true, enum: [left, right, up, down] }
  pane.edges:
    group: observe
    description: Get a pane's edges.
    passthrough: true
  pane.split:
    group: panes
    description: Split a pane; returns the new pane. Omit target_pane_id for the focused pane.
    passthrough: true
    params:
      direction:      { type: string, required: true, enum: [right, down] }
      target_pane_id: { type: string, desc: "Pane to split; defaults to focused." }
      workspace_id:   { type: string }
      ratio:          { type: number, desc: "Fraction for the new pane, 0-1." }
      cwd:            { type: string }
      focus:          { type: boolean }
  pane.swap:
    group: panes
    description: Swap two panes.
    passthrough: true
    params:
      direction: { type: string, enum: [left, right, up, down] }
  pane.move:
    group: panes
    description: Move a pane to another tab/workspace.
    passthrough: true
    params:
      pane_id:     { type: string, required: true }
      destination: { type: object, required: true, desc: 'Tagged by "type": {"type":"tab","tab_id":…,"split":"right|down"} | {"type":"new_tab",…} | {"type":"new_workspace",…}' }
  pane.zoom:
    group: panes
    description: Zoom (maximize) a pane.
    passthrough: true
    params:
      mode: { type: string, enum: [toggle, on, off] }
  pane.focus_direction:
    group: panes
    description: Move focus to the pane in a direction.
    passthrough: true
    params:
      direction: { type: string, required: true, enum: [left, right, up, down] }
  pane.resize:
    group: panes
    description: Resize a pane in a direction.
    passthrough: true
    params:
      direction: { type: string, required: true, enum: [left, right, up, down] }
      amount:    { type: number }
  pane.rename:
    group: panes
    description: Rename a pane.
    params:
      pane_id: { type: string, required: true }
      label:   { type: string }
  pane.close:
    group: panes
    danger: true
    description: Close a pane.
    params:
      pane_id: { type: string, required: true }
  pane.send_text:
    group: io
    description: Type literal text into a pane. Does NOT press Enter.
    params:
      pane_id: { type: string, required: true }
      text:    { type: string, required: true }
  pane.send_keys:
    group: io
    description: 'Send key chords to a pane, e.g. submit a composer with ["Enter"], or interrupt with ["C-c"].'
    params:
      pane_id: { type: string, required: true }
      keys:    { type: array, required: true, desc: 'Array of key-chord strings, e.g. ["Enter"], ["C-c"], ["C-x","C-s"].' }
  pane.send_input:
    group: io
    description: 'Send text and/or keys to a pane in one call. To type a line and submit it, pass text plus keys ["Enter"].'
    params:
      pane_id: { type: string, required: true }
      text:    { type: string, desc: "Text to type (optional)." }
      keys:    { type: array,  desc: 'Key chords to send after the text, e.g. ["Enter"] to submit.' }
  pane.wait_for_output:
    group: io
    description: Block until output matches, or timeout_ms elapses.
    passthrough: true
    params:
      pane_id:    { type: string, required: true }
      source:     { type: string, required: true, enum: [visible, recent, recent_unwrapped, detection] }
      match:      { type: object, required: true, desc: 'Match spec: {"type":"substring","value":"…"} or {"type":"regex","value":"…"}' }
      lines:      { type: integer }
      timeout_ms: { type: integer }
  pane.report_agent:
    group: authority
    description: "Advanced: report an agent's state into a pane."
    passthrough: true
    params:
      pane_id: { type: string, required: true }
      source:  { type: string, required: true }
      agent:   { type: string, required: true }
      state:   { type: string, required: true, enum: [idle, working, blocked, unknown] }
  pane.report_agent_session:
    group: authority
    description: "Advanced: report an agent session id for a pane."
    passthrough: true
    params:
      pane_id: { type: string, required: true }
      source:  { type: string, required: true }
      agent:   { type: string, required: true }
  pane.report_metadata:
    group: authority
    description: "Advanced: report pane metadata (title, status, labels)."
    passthrough: true
    params:
      pane_id: { type: string, required: true }
      source:  { type: string, required: true }
  pane.clear_agent_authority:
    group: authority
    description: "Advanced: clear a pane's agent authority."
    passthrough: true
    params:
      pane_id: { type: string, required: true }
  pane.release_agent:
    group: authority
    description: "Advanced: release the agent owning a pane."
    passthrough: true
    params:
      pane_id: { type: string, required: true }
      source:  { type: string, required: true }
      agent:   { type: string, required: true }

  # ── layout ──────────────────────────────────────────────────────────────
  layout.export:
    group: observe
    description: Export the current layout.
    passthrough: true
  layout.apply:
    group: panes
    description: Apply a layout tree.
    passthrough: true
    params:
      root: { type: object, required: true, desc: 'Layout tree (LayoutNode): tagged by "type": "pane" | "split".' }

  # ── events ──────────────────────────────────────────────────────────────
  events.subscribe:
    group: events
    description: Subscribe to events (returns the subscription ack).
    passthrough: true
    params:
      subscriptions: { type: array, required: true, desc: 'Array of {"type":"pane.agent_status_changed","pane_id":…} or {"type":"pane.output_matched",…}.' }
  events.wait:
    group: events
    description: Block until a matching event fires, then return it.
    passthrough: true
    params:
      match_event: { type: object, required: true, desc: 'Event match tagged by "event", e.g. {"event":"pane_agent_status_changed","pane_id":"…","agent_status":"done"}.' }
      timeout_ms:  { type: integer }

  # ── integration ─────────────────────────────────────────────────────────
  integration.install:
    group: admin
    description: Install a herdr agent integration.
    params:
      target: { type: string, required: true, enum: [pi, omp, claude, codex, copilot, devin, droid, kimi, opencode, kilo, hermes, qodercli, cursor] }
  integration.uninstall:
    group: admin
    description: Uninstall a herdr agent integration.
    params:
      target: { type: string, required: true, enum: [pi, omp, claude, codex, copilot, devin, droid, kimi, opencode, kilo, hermes, qodercli, cursor] }

  # ── plugin ──────────────────────────────────────────────────────────────
  plugin.list:
    group: observe
    description: List linked plugins.
    passthrough: true
    params:
      plugin_id: { type: string }
  plugin.action.list:
    group: observe
    description: List plugin actions.
    passthrough: true
    params:
      plugin_id: { type: string }
  plugin.log.list:
    group: observe
    description: List plugin command logs.
    passthrough: true
    params:
      plugin_id: { type: string }
      limit:     { type: integer }
  plugin.link:
    group: admin
    description: Link a plugin from a path.
    passthrough: true
    params:
      path:    { type: string, required: true }
      enabled: { type: boolean }
  plugin.unlink:
    group: admin
    description: Unlink a plugin.
    params:
      plugin_id: { type: string, required: true }
  plugin.enable:
    group: admin
    description: Enable a plugin.
    params:
      plugin_id: { type: string, required: true }
  plugin.disable:
    group: admin
    description: Disable a plugin.
    params:
      plugin_id: { type: string, required: true }
  plugin.action.invoke:
    group: admin
    description: Invoke a plugin action.
    passthrough: true
    params:
      action_id: { type: string, required: true }
      plugin_id: { type: string }
  plugin.pane.open:
    group: admin
    description: Open a plugin pane.
    passthrough: true
    params:
      plugin_id:  { type: string, required: true }
      entrypoint: { type: string, required: true }
  plugin.pane.focus:
    group: admin
    description: Focus a plugin pane.
    params:
      pane_id: { type: string, required: true }
  plugin.pane.close:
    group: admin
    description: Close a plugin pane.
    params:
      pane_id: { type: string, required: true }
